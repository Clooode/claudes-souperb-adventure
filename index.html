<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="2; url=https://clooode.github.io/claudes-souperb-adventure/bratsoup/bun_night.html"><!-- 2s delay so user sees vibe -->
  <style>
    /* BRAT colors & fonts */
    body {
      background-color: #8ACE00; /* BRAT green */
      color: black;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container {
      text-align: center;
      transform: translateY(-10px); /* slight offset for chaos */
    }

    h1 {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: -4px;
      text-transform: lowercase;
      display: inline-block;
      transform: scaleY(1.35) rotate(-1deg);
      filter: blur(0.6px);
      text-shadow: 0 0 1px black;
      margin-bottom: 20px;
    }

    /* Blinking cursor */
    .blinking-cursor::after {
      content: "|";
      animation: blink 1s step-start infinite;
      margin-left: 5px;
      color: black;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    p {
      font-size: 16px;
      margin: 5px auto;
      max-width: 400px;
      opacity: 0.8;
      transform: translateX(calc(-1px + 2px * var(--rand)));
    }

    a.btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: black;
      color: #8ACE00;
      font-weight: bold;
      text-decoration: none;
      transform: rotate(-1deg);
    }

    a.btn:hover {
      transform: rotate(1deg) translateX(2px);
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="blinking-cursor">redirecting</h1>
    <p>please hold while the chaos loads…</p>
    <p>or click below if you’re impatient</p>
    <a class="btn" href="https://clooode.github.io/claudes-souperb-adventure/bratsoup/bun_night.html">go to soup page</a>
  </div>

  <script>
    // subtle jitter for brat energy
    const ps = document.querySelectorAll('p');
    ps.forEach(p => {
      p.style.setProperty('--rand', Math.random());
    });
  </script>
</body>
</html>
